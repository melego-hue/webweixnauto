<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">bb-browser Skill social preview</title>
  <desc id="desc">GitHub social preview image for the bb-browser skill repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071122"/>
      <stop offset="55%" stop-color="#0f2d63"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="40" fill="url(#bg)"/>

  <circle cx="1080" cy="110" r="190" fill="#60a5fa" opacity="0.12"/>
  <circle cx="100" cy="590" r="220" fill="#93c5fd" opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="70" y="120" width="440" height="330" rx="26" fill="#08101d" opacity="0.92" stroke="#60a5fa" stroke-opacity="0.42"/>
    <rect x="96" y="150" width="388" height="26" rx="13" fill="#0f172a"/>
    <circle cx="118" cy="163" r="6" fill="#f87171"/>
    <circle cx="138" cy="163" r="6" fill="#fbbf24"/>
    <circle cx="158" cy="163" r="6" fill="#34d399"/>
    <rect x="108" y="202" width="190" height="16" rx="8" fill="#93c5fd"/>
    <rect x="108" y="232" width="262" height="12" rx="6" fill="#dbeafe" opacity="0.95"/>
    <rect x="108" y="254" width="236" height="12" rx="6" fill="#bfdbfe" opacity="0.72"/>
    <rect x="108" y="286" width="312" height="62" rx="14" fill="#0b1220" stroke="#1d4ed8" stroke-opacity="0.6"/>
    <text x="128" y="321" fill="#dbeafe" font-size="19" font-family="SFMono-Regular, Menlo, Consolas, monospace">bb-browser site zhihu/hot</text>
    <rect x="108" y="372" width="146" height="34" rx="17" fill="url(#glow)"/>
    <text x="136" y="394" fill="#071122" font-size="18" font-family="Verdana, DejaVu Sans, sans-serif" font-weight="700">site-first</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="338" width="380" height="182" rx="24" fill="#0b1220" opacity="0.94" stroke="#93c5fd" stroke-opacity="0.4"/>
    <text x="852" y="384" fill="#eff6ff" font-size="24" font-family="SFMono-Regular, Menlo, Consolas, monospace">npx -y bb-browser --mcp</text>
    <rect x="852" y="410" width="290" height="12" rx="6" fill="#bfdbfe" opacity="0.7"/>
    <rect x="852" y="438" width="250" height="12" rx="6" fill="#93c5fd" opacity="0.75"/>
    <rect x="852" y="470" width="152" height="34" rx="17" fill="#eff6ff"/>
    <text x="878" y="493" fill="#0f172a" font-size="18" font-family="Verdana, DejaVu Sans, sans-serif" font-weight="700">MCP-ready</text>
  </g>

  <text x="560" y="190" fill="#eff6ff" font-size="72" font-family="Verdana, DejaVu Sans, sans-serif" font-weight="700">bb-browser Skill</text>
  <text x="560" y="250" fill="#bfdbfe" font-size="32" font-family="Verdana, DejaVu Sans, sans-serif">Use your real browser session as an agent tool surface</text>
  <text x="560" y="320" fill="#dbeafe" font-size="26" font-family="Verdana, DejaVu Sans, sans-serif">site-first workflows, authenticated fetches, page control, and MCP integration</text>

  <g>
    <rect x="560" y="372" width="214" height="42" rx="21" fill="#eff6ff" opacity="0.98"/>
    <text x="592" y="399" fill="#0f172a" font-size="20" font-family="Verdana, DejaVu Sans, sans-serif" font-weight="700">real login state</text>
    <rect x="792" y="372" width="170" height="42" rx="21" fill="#0b1220" stroke="#93c5fd" stroke-opacity="0.7"/>
    <text x="824" y="399" fill="#dbeafe" font-size="20" font-family="Verdana, DejaVu Sans, sans-serif" font-weight="700">cross-agent</text>
  </g>

  <text x="560" y="486" fill="#dbeafe" font-size="22" font-family="Verdana, DejaVu Sans, sans-serif">Codex · Claude Code · Cursor · any MCP-capable runtime</text>
</svg>
